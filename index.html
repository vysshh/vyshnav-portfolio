<script src="https://unpkg.com/aos@next/dist/aos.js"></script>
    <script>
        // 1. Initialize Scroll Animations
        AOS.init({ duration: 1000, once: true, offset: 50, easing: 'ease-out-expo' });

        // 2. Navbar Scroll Logic
        window.addEventListener('scroll', () => {
            const nav = document.getElementById('navbar');
            if (window.scrollY > 50) {
                nav.classList.add('scrolled');
            } else {
                nav.classList.remove('scrolled');
            }
        });
        
        // 3. 3D Magnetic Glass Engine
        const cards = document.querySelectorAll('.cert-item');
        
        cards.forEach(card => {
            const glare = card.querySelector('.glare');

            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;

                const centerX = rect.width / 2;
                const centerY = rect.height / 2;

                const rotateX = ((y - centerY) / centerY) * -12; 
                const rotateY = ((x - centerX) / centerX) * 12;

                card.style.transform = `perspective(1000px) rotateX(${rotateX}deg) rotateY(${rotateY}deg) scale3d(1.02, 1.02, 1.02)`;

                if(glare) {
                    glare.style.background = `radial-gradient(circle at ${x}px ${y}px, rgba(255, 26, 26, 0.4), transparent 60%)`;
                    glare.style.opacity = '1';
                }
            });

            card.addEventListener('mouseleave', () => {
                card.style.transform = `perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)`;
                card.classList.add('snap-back');
                setTimeout(() => card.classList.remove('snap-back'), 600);
                if(glare) glare.style.opacity = '0';
            });
            
            card.addEventListener('mouseenter', () => {
                card.classList.remove('snap-back');
            });

            card.addEventListener('click', () => {
                const imgSrc = card.querySelector('img').src;
                window.open(imgSrc, '_blank');
            });
        });

        // 4. Handle Contact Form Transmission
        const contactForm = document.getElementById('contactForm');
        const responseMsg = document.getElementById('responseMsg');
        const submitBtn = document.getElementById('submitBtn');

        if (contactForm) {
            contactForm.addEventListener('submit', async (e) => {
                e.preventDefault(); 
                
                submitBtn.innerText = "Transmitting...";
                submitBtn.disabled = true;

                const formData = {
                    name: document.getElementById('name').value,
                    email: document.getElementById('email').value,
                    message: document.getElementById('message').value
                };

                try {
                    const response = await fetch('/api/contact', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(formData)
                    });

                    if (response.ok) {
                        responseMsg.style.color = "#ff1a1a"; // Laser Red Accent
                        responseMsg.innerText = "✓ Transmission successful. Connection established.";
                        contactForm.reset();
                    } else {
                        throw new Error("Failed to send message.");
                    }
                } catch (err) {
                    responseMsg.style.color = "#ff4444"; // Standard error red
                    responseMsg.innerText = "✕ Transmission failed. Please try again.";
                } finally {
                    submitBtn.innerText = "Send Transmission";
                    submitBtn.disabled = false;
                }
            });
        }
    </script>
